<section class="py-5 bg-light">
  <div class="container">

    <!-- Tabs & Filter Row -->
    <div class="row align-items-center mb-4">

      <!-- Tabs -->
      <div class="col-12 col-md-6 mb-3 mb-md-0">
        <div class="btn-group w-100" role="group">
          <button type="button"
                  class="btn btn-lg rounded-start-3"
                  [class.active-tab]="activeTab === 'compulsory'"
                  [style.background-color]="activeTab === 'compulsory' ? '#1e40af' : '#d1d5db'"
                  [style.color]="activeTab === 'compulsory' ? 'white' : '#6b7280'"
                  style="border: none;"
                  (click)="switchTab('compulsory')">
            Compulsory Subjects
          </button>
          <button type="button"
                  class="btn btn-lg rounded-end-3"
                  [class.active-tab]="activeTab === 'elective'"
                  [style.background-color]="activeTab === 'elective' ? '#1e40af' : '#d1d5db'"
                  [style.color]="activeTab === 'elective' ? 'white' : '#6b7280'"
                  style="border: none;"
                  (click)="switchTab('elective')">
            Elective Subjects
          </button>
        </div>
      </div>

      <!-- Subject Dropdown Filter -->
      <div class="col-12 col-md-6">
        <select class="form-select form-select-lg rounded-3 border-2"
                style="border-color: #1e40af; color: #1e40af;"
                [(ngModel)]="selectedSubject"
                (change)="onFilterChange(selectedSubject)">
          <option value="">Subject</option>
          <option value="english">English</option>
          <option value="science">General Science</option>
          <option value="pakistan">Pakistan Affairs</option>
          <option value="current">Current Affairs</option>
          <option value="islamic">Islamic Studies</option>
        </select>
      </div>
    </div>

    <!-- Subjects Grid -->
    <div class="card border-0 shadow-sm rounded-4">
      <div class="card-body p-4">
        <div class="row g-3">

          <div class="col-12 col-md-6"
               *ngFor="let subject of filteredSubjects">
            <div class="subject-item d-flex align-items-center justify-content-between p-3 rounded-3 border border-2"
                 style="border-color: #e5e7eb !important;">
              <div class="d-flex align-items-center gap-3">
                <i class="bi bi-file-pdf-fill text-danger fs-3"></i>
                <span class="fw-semibold" style="color: #1e293b;">{{ subject.name }}</span>
              </div>
              <button class="btn btn-link p-0" (click)="downloadSubject(subject.name)">
                <i class="bi bi-download" style="color: #1e40af; font-size: 1.25rem;"></i>
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-center align-items-center gap-2 mt-4">
      <button class="btn btn-outline-dark rounded-pill px-4">
        <i class="bi bi-arrow-left me-2"></i>Previous
      </button>
      <div class="d-flex gap-2">
        <button class="btn rounded-circle"
                style="width:45px;height:45px;background-color:#1e40af;color:white;border:none;">1</button>
        <button class="btn btn-outline-secondary rounded-circle"
                style="width:45px;height:45px;">2</button>
        <button class="btn btn-outline-secondary rounded-circle"
                style="width:45px;height:45px;">3</button>
        <span class="d-flex align-items-center px-2">...</span>
      </div>
      <button class="btn btn-outline-dark rounded-pill px-4">
        Next<i class="bi bi-arrow-right ms-2"></i>
      </button>
    </div>

  </div>
</section>
