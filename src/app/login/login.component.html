<div class="container-fluid rounded-lg p-0 overflow-hidden vh-100 bg-light">
  <div class="row h-100">
    <!-- Left Section: Login Form -->
 <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center ">
      <div class="login-container p-3 p-md-4 mt-5 bg-white" style="max-width: 500px; width: 100%;">
        
        <!-- Logo -->
        <div class="text-center mb-4">
          <a href="#" routerLink="/" class="d-inline-block">
            <img src="../../assets/lcons/Logo.svg" alt="Pakistan Volunteers" >
          </a>
        </div>
        
        <!-- Heading -->
        <h2 class="fw-bold text-center mb-2" style="color: #1e293b; font-size: clamp(1.75rem, 3vw, 2rem);">
          Login
        </h2>
        <p class="text-center text-secondary mb-4">
          Please enter your login details
        </p>
        
        <!-- Username Field -->
        <div class="mb-3">
          <label class="form-label fw-semibold" style="color: #475569;">Username</label>
          <input
            type="text"
            [(ngModel)]="email"
            placeholder="Enter Username"
            class="form-control form-control-lg"
            style="border-color: #e2e8f0; border-radius: 0.5rem;"
          />
        </div>
        
        <!-- Password Field -->
        <div class="mb-3 position-relative">
          <label class="form-label fw-semibold" style="color: #475569;">Password</label>
          <input
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            placeholder="Enter Password"
            class="form-control form-control-lg pe-5"
            style="border-color: #e2e8f0; border-radius: 0.5rem;"
          />
          <button 
            type="button"
            class="btn btn-link position-absolute end-0 top-50 translate-middle-y mt-3 me-2"
            (click)="togglePassword()"
            style="text-decoration: none;">
            <i class="bi" 
               [ngClass]="hidePassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"
               style="color: #FF2056; font-size: 1.25rem;"></i>
          </button>
        </div>
        
        <!-- Forgot Password -->
        <!-- <div class="text-end mb-4">
          <a routerLink="/forget-password" 
             class="text-decoration-none fw-semibold" 
             style="color: #FF2056;">
            Forgot password?
          </a>
        </div> -->
        
        <!-- Login Button -->
        <button
          class="btn btn-lg w-100 mb-2 fw-semibold text-white"
          (click)="onLogin()"
          style="background-color: #FF2056; border: none; border-radius: 25px; padding: 0.875rem;">
          Login
        </button>
        
        <!-- Divider -->
        <!-- <div class="d-flex align-items-center my-2">
          <hr class="flex-grow-1" style="border-color: #e2e8f0;">
          <span class="mx-3 text-secondary small">OR</span>
          <hr class="flex-grow-1" style="border-color: #e2e8f0;">
        </div> -->
        
        <!-- Google Sign In -->
        <!-- <div #googleButton class="w-100 d-flex justify-content-center"></div> -->
        
        <!-- Sign Up Link -->
        <!-- <div class="text-center mt-4">
          <p class="text-secondary mb-0">
            Don't have an account? 
            <a routerLink="/register" class="text-decoration-none fw-semibold" style="color: #FF2056;">
              Sign up
            </a>
          </p>
        </div> -->
        
      </div>
    </div>

    <!-- Right Section: Background with Grid -->
     <div class=" col-md-6  image-section loginbg "></div>
    
  </div>
</div>
