<div class="min-vh-100 d-flex align-items-center justify-content-center py-5 greymuted" 
    >
  <div class="container px-3">
    
    <!-- Login Card -->
    <div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width: 450px;">
      <div class="card-body p-4 p-md-5">
        
        <!-- Header -->
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-2" style="font-size: clamp(1.5rem, 4vw, 2rem);">
            Welcome Back
          </h2>
          <p class="text-muted mb-0">Login to your Mosque account</p>
        </div>
        
        <!-- Login Form -->
        <form>
          <!-- Email Field -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" 
                   class="form-control form-control-lg" 
                   placeholder="your@email.com" 
                   required>
          </div>
          
          <!-- Password Field -->
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="position-relative">
              <input type="password" 
                     class="form-control form-control-lg" 
                     placeholder="Enter your password" 
                     id="password"
                     required>
              <button type="button" 
                      class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted"
                      onclick="togglePassword()">
                <i class="bi bi-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>
          
          <!-- Submit Button -->
          <button type="submit" 
                  class="btn themecolor btn-lg text-white rounded-pill w-100 mb-1 py-2 fw-semibold">
             Login
          </button>
          
          <!-- Sign Up Link -->
          <!-- <p class="text-center mb-0">
            Don't have an account? 
            <a href="#" class="text-warning text-decoration-none fw-semibold">Sign up</a>
          </p> -->
        </form>
        
      </div>
    </div>
    
  </div>
</div>
<app-footer></app-footer>
