<section class="py-5 bg-white">
  <div class="container">
       <div class="text-center mb-4">
       <img src="../../assets/lcons/Logo.svg" width="120" class="mb-3">
       <h2 class="fw-bold">Register yourself to request lecture</h2>
    </div>
    <div class="card shadow-sm border p-4 mx-auto" style="max-width: 1000px; border-radius: 12px;">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="#" class="text-dark text-decoration-none fw-bold"><i class="bi bi-arrow-left me-2"></i>Back</a>
      </div>
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">Personal Details</h5>
        <button class="btn btn-primary px-4 py-2" style="background-color: #1e3a8a; border: none; border-radius: 8px;">Create</button>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Full Name</label>
          <input type="text" class="form-control py-2 border" placeholder="Enter your Name" style="border-radius: 8px;">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Phone number</label>
          <div class="input-group border rounded" style="border-radius: 8px;">
            <select class="form-select border-0 bg-transparent" style="max-width: 100px;">
              <option>Pak +92</option>
            </select>
            <input type="text" class="form-control border-0" placeholder="300-xxxxxxx">
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Email Address</label>
          <input type="email" class="form-control py-2 border" placeholder="xyz@gmail.com" style="border-radius: 8px;">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Set Password</label>
          <input type="password" class="form-control py-2 border" placeholder="Enter Password" style="border-radius: 8px;">
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Highest Degree</label>
          <select class="form-select py-2 border text-muted" style="border-radius: 8px;">
            <option selected>Select your last degree</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-secondary">Professional (if any)</label>
          <input type="text" class="form-control py-2 border" placeholder="Ex. Internship at Aimsoft as a UI/UX Designer" style="border-radius: 8px;">
        </div>

        <div class="col-12">
          <label class="form-label small fw-bold text-secondary">Subjects</label>
          <select class="form-select py-2 border text-muted" style="border-radius: 8px;">
            <option selected>Appearing subj CSS</option>
          </select>
        </div>
      </div>

      <div class="mt-4 d-flex flex-wrap gap-3">
        <div class="subject-tag">Introduction to Computing <i class="bi bi-x-circle-fill text-danger ms-2"></i></div>
        <div class="subject-tag">Computer Graphics <i class="bi bi-x-circle-fill text-danger ms-2"></i></div>
        <div class="subject-tag">Discrete Structure <i class="bi bi-x-circle-fill text-danger ms-2"></i></div>
        <div class="subject-tag">English Comprehension <i class="bi bi-x-circle-fill text-danger ms-2"></i></div>
      </div>
    </div>
  </div>
</section>
