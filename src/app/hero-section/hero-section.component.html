<section class="hero-carousel">
  <div id="disasterCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
    
    <!-- Carousel Indicators -->
    <div class="carousel-indicators">
      <button *ngFor="let slide of slides; let i = index" 
              type="button" 
              [attr.data-bs-target]="'#disasterCarousel'" 
              [attr.data-bs-slide-to]="i" 
              [class.active]="i === 0">
      </button>
    </div>
    
    <!-- Carousel Inner -->
    <div class="carousel-inner">
      <div *ngFor="let slide of slides; let i = index" 
           class="carousel-item" 
           [class.active]="i === 0">
        
        <!-- Background Image with Overlay -->
        <div class="hero-background" 
             [style.background-image]="'url(' + slide.image + ')'">
          <div class="hero-overlay"></div>
        </div>
        
        <!-- Content -->
        <div class="carousel-caption">
          <div class="container">
            <div class="row justify-content-center">
              <div class="col-12 col-lg-10 text-center">
                
                <!-- Alert Badge -->
                <div class="mb-4">
                  <span class="alert-badge">
                    <i class="bi bi-exclamation-circle-fill me-2"></i>
                    Urgent: Volunteers needed for Flood Relief in Region 4
                  </span>
                </div>
                
                <!-- Main Heading -->
                <h1 class="hero-heading mb-3">
                  Ready to Help When <br>
                  <span class="text-danger">Disaster Strikes.</span>
                </h1>
                
                <!-- Dynamic Description -->
                <p class="hero-description mb-5">
                  {{ slide.description }}
                </p>
                
                <!-- CTA Buttons -->
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                  <a href="/register" class="btn btn-danger btn-lg rounded-pill px-5">
                    Register as a Volunteer
                    <i class="bi bi-arrow-right ms-2"></i>
                  </a>
                  <a href="/incidents" class="btn btn-outline-light btn-lg rounded-pill px-5">
                    View Active Incidents
                  </a>
                </div>
                
              </div>
            </div>
          </div>
        </div>
        
      </div>
    </div>
    
    <!-- Carousel Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#disasterCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#disasterCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
      <span class="visually-hidden">Next</span>
    </button>
    
  </div>
</section>
