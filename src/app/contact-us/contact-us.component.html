<section class="py-5 bg-light" style="min-height: 100vh;">
  <div class="container py-4 py-md-5">
    
    <!-- Section Header -->
    <div class="text-center mb-5">
       <span class="badge rounded-pill bg-secondary bg-opacity-10 text-warning px-3 py-2 mt-4">
       Contact Us
      </span>
      <h2 class=" fw-bold mb-3" style="font-size: clamp(2rem, 5vw, 3rem);">
        Get in Touch
      </h2>
      <p class="text-white-50 mb-0">Have a question? We're here to help</p>
    </div>
    
    <!-- Content Grid -->
    <div class="row g-4 justify-content-center">
      
      <!-- Left Column - Contact Info Cards -->
      <div class="col-12 col-lg-4">
        <div class="d-flex flex-column gap-3 gap-md-4">
          
          <!-- Email Card -->
          <div class="card border-0 shadow-lg rounded-4 p-4">
            <div class="d-flex align-items-center gap-3">
              <div class="bg-warning bg-opacity-25 rounded-3 p-3 flex-shrink-0">
                <i class="bi bi-envelope text-warning fs-4"></i>
              </div>
              <div>
                <p class="text-warning fw-semibold mb-1 small">Email</p>
                <p class="fw-bold mb-0">contact@mosquenetwork.pk</p>
              </div>
            </div>
          </div>
          
          <!-- Phone Card -->
          <div class="card border-0 shadow-lg rounded-4 p-4">
            <div class="d-flex align-items-center gap-3">
              <div class="bg-warning bg-opacity-25 rounded-3 p-3 flex-shrink-0">
                <i class="bi bi-telephone text-warning fs-4"></i>
              </div>
              <div>
                <p class="text-warning fw-semibold mb-1 small">Phone</p>
                <p class="fw-bold mb-0">+92 300 1234567</p>
              </div>
            </div>
          </div>
          
          <!-- Address Card -->
          <div class="card border-0 shadow-lg rounded-4 p-4">
            <div class="d-flex align-items-center gap-3">
              <div class="bg-warning bg-opacity-25 rounded-3 p-3 flex-shrink-0">
                <i class="bi bi-geo-alt text-warning fs-4"></i>
              </div>
              <div>
                <p class="text-warning fw-semibold mb-1 small">Address</p>
                <p class="fw-bold mb-0">Street 04, H-8/1, Islamabad</p>
              </div>
            </div>
          </div>
          
        </div>
      </div>
      
      <!-- Right Column - Contact Form -->
      <div class="col-12 col-lg-7">
        <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
          <form>
            <div class="row g-3 g-md-4">
              
              <!-- Name Field -->
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" placeholder="Your name" required>
              </div>
              
              <!-- Email Field -->
              <div class="col-12 col-md-6">
                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" placeholder="your@email.com" required>
              </div>
              
              <!-- Subject Field -->
              <div class="col-12">
                <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
                <input type="text" class="form-control" placeholder="What is this about?" required>
              </div>
              
              <!-- Message Field -->
              <div class="col-12">
                <label class="form-label fw-semibold">Message <span class="text-danger">*</span></label>
                <textarea class="form-control" rows="5" placeholder="Write your message..." required></textarea>
              </div>
              
              <!-- Submit Button -->
              <div class="col-12">
                <button type="submit" class="btn themecolor btn-lg text-white rounded-pill px-4 px-md-5 py-3">
                  <i class="bi bi-send me-2"></i>
                  Send Message
                </button>
              </div>
              
            </div>
          </form>
        </div>
      </div>
      
    </div>
  </div>
</section>
