<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered cfg-modal-dialog">
    <div class="modal-content cfg-modal">
 
      <div class="modal-header cfg-modal-header">
        <h5 class="cfg-modal-title" id="addCategoryLabel">Add Category</h5>
        <button type="button" class="btn cfg-modal-close" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
 
      <div class="modal-body cfg-modal-body">
        <label class="cfg-label">Category</label>
        <input type="text" class="cfg-input" placeholder="Category Name">
      </div>
 
      <div class="modal-footer cfg-modal-footer">
        <button type="button" class="btn cfg-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn cfg-btn-primary">Add Category</button>
      </div>
 
    </div>
  </div>
</div>
 
 
<!-- ══════════════════════════════════════
     PAGE
══════════════════════════════════════ -->
<div class="cfg-page">
  <div class="cfg-card">
 
    <!-- Header -->
    <div class="mb-4">
      <h2 class="cfg-page-title mb-1">Configuration</h2>
      <p class="cfg-page-sub mb-0">Manage your category and domain</p>
    </div>
 
    <!-- Controls Row -->
    <div class="row g-3 align-items-end mb-4">
 
      <!-- Category Select + Plus button -->
      <div class="col-12 col-md-5">
        <label class="cfg-label mb-2">Category</label>
        <div class="d-flex gap-2 align-items-center">
          <div class="cfg-select-wrap flex-grow-1">
            <select class="cfg-select">
              <option value="" disabled selected hidden>Select Category</option>
              <option>Marketing</option>
              <option>Engineering</option>
              <option>Finance</option>
              <option>Operations</option>
            </select>
            <i class="bi bi-chevron-down cfg-sel-icon"></i>
          </div>
          <!-- Plus button opens Add Category modal -->
          <button
            class="cfg-plus-btn"
            data-bs-toggle="modal"
            data-bs-target="#addCategoryModal"
            title="Add Category">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>
 
      <!-- Add Domain input + button -->
      <div class="col-12 col-md-7">
        <label class="cfg-label mb-2">Add Domain</label>
        <div class="d-flex gap-2 align-items-center">
          <input type="text" class="cfg-input flex-grow-1" placeholder="Enter domain name">
          <button class="btn cfg-btn-primary px-4">Add Domain</button>
        </div>
      </div>
 
    </div>
 
    <!-- Domain Cards Grid -->
    <div class="row g-3">
 
      <div class="col-12 col-md-6 col-xl-4" *ngFor="let i of [1,2,3,4,5,6,7,8,9]">
        <div class="cfg-domain-card d-flex justify-content-between align-items-center">
          <span class="cfg-domain-name">Marketing Intern</span>
          <div class="d-flex gap-2 align-items-center">
            <button class="cfg-icon-btn">
              <i class="bi bi-trash cfg-icon-del"></i>
            </button>
            <button class="cfg-icon-btn">
              <i class="bi bi-pencil-square cfg-icon-edit"></i>
            </button>
          </div>
        </div>
      </div>
 
    </div>
 
  </div>
</div>
