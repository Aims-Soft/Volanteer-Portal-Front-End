<div class="cfg-page">
  <div class="cfg-card">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
      <div>
        <h2 class="cfg-page-title mb-1">Configuration</h2>
        <p class="cfg-page-sub mb-0">Manage your category and domain</p>
      </div>

      <!-- Search Box -->
      <div class="cfg-search-wrap">
        <i class="bi bi-search cfg-search-icon"></i>
        <input
          type="search"
          class="cfg-search-input"
          placeholder="Search domains..."
          [(ngModel)]="searchTerm"
          (input)="onSearch()"
        />
      </div>
    </div>

    <!-- Controls Row -->
    <div class="row g-3 align-items-end mb-4">

      <!-- Category Select + Plus button -->
      <div class="col-12 col-md-5 ">
        <label class="cfg-label mb-2 ">Category</label>
        <div class="d-flex gap-2 align-items-center">
          <div class="cfg-select-wrap flex-grow-1">
            <ng-select
              class="cfg-ng-select"
              name="category"
              [items]="categoryList"
              bindLabel="categoryTitle"
              bindValue="categoryID"
              placeholder="Select Category"
              [(ngModel)]="selectedCategoryID"
              (change)="onCategoryChange()"
              [searchable]="true"
              [clearable]="true"
            ></ng-select>
          </div>
          <!-- Plus button opens Add Category modal -->
          <button
            class="cfg-plus-btn mb-3"
            data-bs-toggle="modal"
            data-bs-target="#addCategoryModal"
            title="Add Category">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>

      <!-- Add Domain input + button -->
      <div class="col-12 col-md-7">
        <label class="cfg-label mb-2">{{ editMode ? 'Edit Domain' : 'Add Domain' }}</label>
        <div class="d-flex gap-2 align-items-center">
          <input
            type="text"
            class="cfg-input flex-grow-1 mb-3"
            placeholder="Enter domain name"
            [(ngModel)]="domainTitle"
            [disabled]="!selectedCategoryID"
          />
          <!-- Cancel edit button -->
          <button
            *ngIf="editMode"
            class="btn cfg-btn-cancel-edit px-3 mb-3"
            (click)="resetDomainForm()"
            title="Cancel edit">
            <i class="bi bi-x-lg"></i>
          </button>
          <button
            class="btn cfg-btn-primary px-4 mb-3"
            (click)="addOrUpdateDomain()"
            [disabled]="!selectedCategoryID || !domainTitle.trim()">
            {{ editMode ? 'Update' : 'Add Domain' }}
          </button>
        </div>
      </div>

    </div>

    <!-- Domain Cards Grid -->
    <div class="row g-3">

      <ng-container *ngIf="filteredDomains.length > 0; else emptyState">
        <div class="col-12 col-md-6 col-xl-4" *ngFor="let domain of filteredDomains">
          <div class="cfg-domain-card d-flex justify-content-between align-items-center">
            <div>
              <span class="cfg-domain-name">{{ domain.domainTitle }}</span>
              <span class="cfg-domain-badge ms-2">{{ getCategoryName(domain.categoryID) }}</span>
            </div>
            <div class="d-flex gap-2 align-items-center">
              <button class="cfg-icon-btn" (click)="editDomain(domain)" title="Edit">
                <i class="bi bi-pencil-square cfg-icon-edit"></i>
              </button>
              <button class="cfg-icon-btn" (click)="deleteDomain(domain)" title="Delete">
                <i class="bi bi-trash cfg-icon-del"></i>
              </button>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Empty State -->
      <ng-template #emptyState>
        <div class="col-12 text-center py-5">
          <i class="bi bi-inbox cfg-empty-icon"></i>
          <p class="cfg-empty-text mt-3">
            {{ searchTerm ? 'No domains match your search.' : 'No domains found. Select a category and add domains.' }}
          </p>
        </div>
      </ng-template>

    </div>

  </div>
</div>

<!-- Add Category Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered cfg-modal-dialog">
    <div class="modal-content cfg-modal">

      <div class="modal-header cfg-modal-header">
        <h5 class="cfg-modal-title" id="addCategoryLabel">Add Category</h5>
        <button type="button" class="btn ms-auto" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <div class="modal-body cfg-modal-body">
        <label class="cfg-label">Category Name</label>
        <input
          type="text"
          class="cfg-input"
          placeholder="Enter category name"
          [(ngModel)]="newCategoryName"
          (keyup.enter)="addCategory()"
        />
      </div>

      <div class="modal-footer cfg-modal-footer">
        <button type="button" class="btn cfg-btn-cancel" data-bs-dismiss="modal">Cancel</button>
        <button
          type="button"
          class="btn cfg-btn-primary"
          (click)="addCategory()"
          [disabled]="!newCategoryName.trim()">
          Add Category
        </button>
      </div>

    </div>
  </div>
</div>
