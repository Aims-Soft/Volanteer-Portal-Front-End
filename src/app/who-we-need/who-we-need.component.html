<section class="py-4" style="background-color: #1e293b;">
  <div class="container-fluid py-4">
    
    <!-- Header -->
    <div class="row align-items-center mb-4 mx-3">
      <div class="col-12 col-lg-8">
        <h2 class="fw-bold text-white mb-3" style="font-size: clamp(2rem, 4vw, 2.75rem);">
          Who We Need
        </h2>
        <p class="text-white-50 mb-0" style="font-size: clamp(1rem, 2vw, 1.15rem); line-height: 1.7;">
          Disaster response requires a diverse set of skills. Whether you're a trained <br> professional or a willing volunteer, there's a place for you.
        </p>
      </div>
      <!-- <div class="col-12 col-lg-4 text-lg-end mt-4 mt-lg-0">
        <a href="/register" class="btn btn-lg rounded-pill px-5 py-3 fw-semibold" 
           style="background-color: #334155; color: white; border: none;">
          Register Now
        </a>
      </div> -->
    </div>
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="row mx-3">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-light" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-white-50 mt-3">Loading skills...</p>
      </div>
    </div>
    
    <!-- Roles Grid (Dynamic) -->
    <div *ngIf="!isLoading && skillsList.length > 0" class="row g-4 mx-3">
      
      <div class="col-12 col-md-6 col-lg-4" *ngFor="let category of skillsList">
        <div class="role-card">
          <h5 class="text-white fw-bold mb-3">{{ category.categoryTitle }}</h5>
          <div class="d-flex flex-wrap gap-2">
            <span class="role-badge" *ngFor="let domain of category.parsedDomains">
              {{ domain.domainTitle }}
            </span>
          </div>
        </div>
      </div>
      
    </div>
    
    <!-- Empty State -->
    <div *ngIf="!isLoading && skillsList.length === 0" class="row mx-3">
      <div class="col-12 text-center py-5">
        <i class="bi bi-inbox" style="font-size: 3rem; color: #64748b; display: block;"></i>
        <p class="text-white-50 mt-3">No skills available at the moment.</p>
      </div>
    </div>
    
  </div>
</section>
