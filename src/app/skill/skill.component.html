<!-- ══════════════════════════════════════════════════════════
     ADD / EDIT SKILL MODAL
══════════════════════════════════════════════════════════ -->
<div class="modal fade" id="addSkillsModal" tabindex="-1" aria-labelledby="addSkillsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content sk-modal">

      <!-- Modal Header -->
      <div class="modal-header sk-modal-header">
        <h5 class="sk-modal-title" id="addSkillsModalLabel">
          {{ isEditMode ? 'Edit Skill' : 'Add Skills' }}
        </h5>
        <button type="button" class="btn sk-modal-close" data-bs-dismiss="modal" aria-label="Close" (click)="resetForm()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body sk-modal-body">

        <!-- Category -->
        <div class="mb-4">
          <label class="sk-form-label">Category <span class="text-danger">*</span></label>
          <div class="sk-select-wrapper">
            <select
              class="sk-select"
              [(ngModel)]="f_categoryID"
              (change)="onCategoryChange()">
              <option [ngValue]="null" disabled hidden>Select Category</option>
              <option *ngFor="let c of categoryList" [ngValue]="c.categoryID">
                {{ c.categoryTitle }}
              </option>
            </select>
            <i class="bi bi-chevron-down sk-select-icon"></i>
          </div>
        </div>

        <!-- Domain — pick one at a time, resets after each pick -->
        <div class="mb-3">
          <label class="sk-form-label">Domain <span class="text-danger">*</span></label>
          <div class="sk-select-wrapper">
            <select
              class="sk-select"
              [disabled]="!f_categoryID"
              [(ngModel)]="f_domainDropdown"
              (ngModelChange)="onDomainSelect($event)">
              <option [ngValue]="null" disabled hidden>Select Domain</option>
              <option
                *ngFor="let d of domainList"
                [ngValue]="d.domainID"
                [disabled]="isDomainSelected(d.domainID)">
                {{ d.domainTitle }}
              </option>
            </select>
            <i class="bi bi-chevron-down sk-select-icon"></i>
          </div>
        </div>

        <!-- Selected Domain Tags -->
        <div class="mb-2" *ngIf="selectedDomains.length > 0">
          <div class="d-flex flex-wrap gap-2 mt-1">
            <span class="sk-tag-wrap" *ngFor="let sd of selectedDomains">
              <span class="sk-tag">{{ sd.domainTitle }}</span>
              <span class="sk-tag-actions">
                <button
                  class="sk-icon-btn sk-tag-btn"
                  title="Remove"
                  (click)="removeSelectedDomain(sd.domainID)">
                  <i class="bi bi-x sk-icon-delete"></i>
                </button>
              </span>
            </span>
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="modal-footer sk-modal-footer">
        <button type="button" class="btn sk-btn-cancel" data-bs-dismiss="modal" (click)="resetForm()">
          Cancel
        </button>
        <button
          type="button"
          class="btn sk-btn-add"
          (click)="save()"
          [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : (isEditMode ? 'Update Skill' : 'Add Skill') }}
        </button>
      </div>

    </div>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════
     PAGE
══════════════════════════════════════════════════════════ -->
<div class="sk-page">
  <div class="container-fluid px-4 py-4">

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-start mb-4 pb-3 border-bottom border-secondary-subtle flex-wrap gap-2">
      <div>
        <h2 class="sk-page-title mb-1">Skills</h2>
        <p class="sk-page-sub mb-0">Manage and view skills for volunteers</p>
      </div>

      <div class="d-flex align-items-center gap-2">
        <div class="sk-search-wrap">
          <i class="bi bi-search sk-search-icon"></i>
          <input
            type="search"
            class="sk-search-input"
            placeholder="Search skills..."
            [(ngModel)]="searchTerm"
            (input)="onSearch()"
          />
        </div>
        <button
          class="btn sk-btn-primary d-flex align-items-center gap-2"
          data-bs-toggle="modal"
          data-bs-target="#addSkillsModal"
          (click)="resetForm()">
          <i class="bi bi-plus-lg"></i> Add Skills
        </button>
      </div>
    </div>

    <!-- Skills Grid -->
    <div class="row g-3">
      <ng-container *ngIf="filteredSkills.length > 0; else emptyState">
        <div class="col-12 col-md-6 col-xl-4" *ngFor="let card of filteredSkills">
          <div class="sk-card">

            <!-- Card Header: title + circular pill buttons -->
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="sk-card-title mb-0">{{ card.categoryTitle }}</h6>
              <div class="d-flex gap-2">
                <button class="sk-icon-btn" title="Edit" (click)="editSkill(card)">
                  <i class="bi bi-pencil sk-icon-edit"></i>
                </button>
                <button class="sk-icon-btn" title="Delete" (click)="deleteSkill(card)">
                  <i class="bi bi-trash sk-icon-delete"></i>
                </button>
              </div>
            </div>

            <!-- Domain tags — scrollable area inside fixed-height card -->
            <div class="sk-card-domains">
              <div class="d-flex flex-wrap gap-2">
                <span class="sk-tag" *ngFor="let domain of card.parsedDomains">
                  {{ domain.domainTitle }}
                </span>
              </div>
            </div>

          </div>
        </div>
      </ng-container>

      <ng-template #emptyState>
        <div class="col-12 text-center py-5">
          <i class="bi bi-inbox" style="font-size: 3rem; color: #cbd5e1; display:block;"></i>
          <p class="text-muted mt-3" style="font-size:0.875rem;">
            {{ searchTerm ? 'No skills match your search.' : 'No skills found. Add your first skill.' }}
          </p>
        </div>
      </ng-template>
    </div>

  </div>
</div>
